{% load static %}
{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Trimis - RentGuru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <style>
        body { background-color: #fdf6e3; } /* Culoarea ta bej */
        .auth-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">RentGuru</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card auth-card p-4 p-md-5 text-center">
                    <h2 class="fw-bold mb-4" style="color: #2d5a27;">Email Trimis!</h2>
                    
                    <div class="mb-4">
                        <i class="bi bi-envelope-check" style="font-size: 4rem; color: #a0522d;"></i>
                    </div>

                    <p class="text-muted mb-4">
                        Ți-am trimis un link de resetare a parolei. Verifică Inbox-ul și folderul Spam.
                    </p>
                    
                    <a href="{% url 'login' %}" class="btn btn-custom w-100 py-2 fw-bold" 
                       style="background-color: #2d5a27; color: white; border-radius: 10px; text-decoration: none;">
                        Înapoi la Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5">
        <p class="text-muted small">© 2026 RentGuru</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
