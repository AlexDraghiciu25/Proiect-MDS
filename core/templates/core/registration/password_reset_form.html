{% extends "core/login.html" %}
{% block content %}
<div class="auth-container" style="background: rgba(253, 246, 227, 0.8); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; max-width: 450px; margin: 80px auto; border: 1px solid rgba(45, 90, 39, 0.3); text-align: center;">
    <h2 style="color: #2d5a27; margin-bottom: 20px;">Recuperare Parolă</h2>
    <p style="color: #3e2723; margin-bottom: 30px;">Introdu adresa de email pentru a primi link-ul de resetare.</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            {{ form.email }}
        </div>
        <button type="submit" style="background: #a0522d; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold;">Trimite Email-ul</button>
    </form>
</div>
{% endblock %}
