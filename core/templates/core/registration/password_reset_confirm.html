{% extends "core/login.html" %}
{% block content %}
<div class="auth-container" style="background: rgba(253, 246, 227, 0.8); padding: 40px; border-radius: 20px; max-width: 450px; margin: 80px auto;">
    <h2 style="color: #2d5a27; text-align: center;">Setează Noua Parolă</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #2d5a27; color: white; padding: 12px 25px; border: none; border-radius: 10px; width: 100%;">Salvează Parola</button>
    </form>
</div>
{% endblock %}
