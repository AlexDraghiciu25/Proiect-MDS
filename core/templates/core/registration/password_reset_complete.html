{% extends "core/login.html" %}

{% block content %}
<div class="auth-container" style="background: rgba(253, 246, 227, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; max-width: 450px; margin: 80px auto; border: 1px solid #2d5a27; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    
    <h2 style="color: #2d5a27; font-family: 'Lora', serif; margin-bottom: 20px;">Parolă Schimbată!</h2>
    
    <div class="icon-box" style="margin-bottom: 25px;">
        <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #2d5a27;"></i>
    </div>

    <p style="color: #3e2723; font-size: 1.1rem; margin-bottom: 30px;">
        Totul a decurs perfect. Noua ta parolă a fost salvată și este acum activă.
    </p>
    
    <a href="{% url 'login' %}" class="btn w-100" 
       style="background: #a0522d; color: white; padding: 12px; border-radius: 10px; font-weight: bold; text-decoration: none; display: inline-block; transition: 0.3s;">
        Loghează-te acum
    </a>

</div>
{% endblock %}
