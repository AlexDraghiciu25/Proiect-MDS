{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se analizează... - RentGuru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carattere&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --mds-cream: #F9F6F0;
            --mds-brown: #5C4033;
            --mds-green: #2D4A22;
            --mds-text:  #3E2A1F;
            --font-logo: 'Carattere', cursive;
            --font-body: 'Lora', serif;
        }

        body {
            background-color: var(--mds-cream);
            color: var(--mds-text);
            font-family: var(--font-body);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }

        .loading-logo {
            font-family: var(--font-logo);
            font-size: 3.5rem;
            color: var(--mds-brown);
            margin-bottom: 40px;
            line-height: 1;
        }

        /* Animația de pulsare pentru cercul exterior */
        .pulse-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                var(--mds-green) 0deg,
                rgba(45, 74, 34, 0.3) 120deg,
                var(--mds-green) 240deg,
                rgba(45, 74, 34, 0.3) 360deg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px auto;
            animation: spin 2s linear infinite;
            position: relative;
        }

        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(45, 74, 34, 0.15);
            animation: pulse-expand 2s ease-in-out infinite;
        }

        .pulse-inner {
            width: 96px;
            height: 96px;
            background-color: var(--mds-cream);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-inner i {
            font-size: 2rem;
            color: var(--mds-green);
            animation: icon-pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-expand {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0; }
        }

        @keyframes icon-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        .loading-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--mds-brown);
            margin-bottom: 10px;
        }

        .loading-step {
            font-size: 1rem;
            color: var(--mds-brown);
            font-style: italic;
            opacity: 0.85;
            margin-bottom: 30px;
            min-height: 1.5em;
            transition: opacity 0.3s ease;
        }

        /* Bara de progres animată */
        .progress-track {
            width: 280px;
            height: 4px;
            background-color: rgba(45, 74, 34, 0.1);
            border-radius: 4px;
            margin: 0 auto 25px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--mds-green), #4a7a3a);
            border-radius: 4px;
            animation: progress-slide 1.8s ease-in-out infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        .loading-hint {
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.5;
        }

        /* Starea de eroare */
        .error-container {
            display: none;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(220, 38, 38, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        .error-icon i {
            font-size: 2rem;
            color: #dc2626;
        }

        .btn-back {
            background-color: var(--mds-green);
            color: var(--mds-cream);
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 30px;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .btn-back:hover {
            background-color: #1F3317;
            color: var(--mds-cream);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Stare normală: loading -->
    <div class="loading-container" id="loading-state">
        <div class="loading-logo">RentGuru</div>

        <div class="pulse-ring">
            <div class="pulse-inner">
                <i class="bi bi-robot"></i>
            </div>
        </div>

        <h2 class="loading-title">RentGuru analizează...</h2>
        <p class="loading-step" id="step-text">Inițializăm scanarea...</p>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <p class="loading-hint">
            <i class="bi bi-info-circle me-1"></i>
            Scanăm anunțul, verificăm prețul zonei și generăm raportul AI.
            <br>Acest proces durează de obicei 15-30 de secunde.
        </p>
    </div>

    <!-- Stare de eroare -->
    <div class="loading-container error-container" id="error-state">
        <div class="loading-logo">RentGuru</div>

        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <h2 class="loading-title" style="color: #b91c1c;">Analiză eșuată</h2>
        <p class="loading-step" id="error-text" style="color: #6b7280; font-style: normal;"></p>

        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left me-2"></i>Înapoi la Dashboard
        </a>
    </div>

    <script>
        const taskId = "{{ task_id }}";
        const stepText = document.getElementById('step-text');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const errorText = document.getElementById('error-text');

        function pollStatus() {
            fetch(`/api/task-status/${taskId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'done' && data.redirect_url) {
                        stepText.textContent = 'Raportul este gata! Redirecționăm...';
                        setTimeout(() => {
                            window.location.href = data.redirect_url;
                        }, 500);
                    } else if (data.status === 'error') {
                        loadingState.style.display = 'none';
                        errorState.style.display = 'block';
                        errorText.textContent = data.error || 'A apărut o eroare necunoscută.';
                    } else {
                        // Încă procesează — actualizăm mesajul
                        if (data.step) {
                            stepText.style.opacity = '0';
                            setTimeout(() => {
                                stepText.textContent = data.step;
                                stepText.style.opacity = '1';
                            }, 200);
                        }
                        setTimeout(pollStatus, 2000);
                    }
                })
                .catch(err => {
                    console.error('Polling error:', err);
                    setTimeout(pollStatus, 3000);
                });
        }

        // Pornim polling-ul după 1 secundă
        setTimeout(pollStatus, 1000);
    </script>

</body>
</html>
