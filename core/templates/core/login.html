{% load django_bootstrap5 static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - RentGuru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="container login-container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="card">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center mb-4 fw-bold text-custom-primary">RentGuru</h2>
                    <p class="text-center text-muted mb-4">Introdu datele pentru a te loga</p>

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {% bootstrap_form form %}
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-custom btn-lg shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Loghează-te
                        </button>
                        </div>
                    </form>

                    <div class="text-center mt-4 border-top pt-3">
                        <p class="mb-0 text-muted small">Nu ai cont? 
                            <a href="{% url 'register' %}" class="link-custom">Creează unul aici</a>
                        </p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
